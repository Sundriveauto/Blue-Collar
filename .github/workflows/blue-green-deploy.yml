###############################################################################
# Blue-Green Deployment Pipeline
#
# Triggers:
#   - Push to main
#   - Manual workflow_dispatch (with canary option)
#
# Stages:
#   1. build          Build + scan Docker image, push to ECR
#   2. db-migrate     Run expand-phase DB migrations (backward-compatible)
#   3. deploy         Blue-green swap via deploy-blue-green.sh
#   4. smoke-tests    Post-deploy validation
#   5. monitor        60-second live monitoring window
#   6. rollback       Triggered automatically on any stage failure
#   7. notify         Slack notification on success or failure
###############################################################################
name: Blue-Green Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]
      canary:
        description: "Use canary rollout instead of full cut-over"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      canary_weight:
        description: "Initial canary traffic weight (1-50%)"
        required: false
        default: "5"
      skip_migration:
        description: "Skip database migration step"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  # Only one deployment per environment at a time; cancel queued (not in-progress)
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  IMAGE_NAME: bluecollar-api
  APP_IMAGE_NAME: bluecollar-app
  NAMESPACE: bluecollar
  AWS_REGION: us-east-1
  # Deployment settings
  ROLLOUT_TIMEOUT: "300"
  MONITOR_DURATION: "120"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. BUILD — Build, scan, and push Docker images
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      full-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push yet — scan first)
        uses: docker/build-push-action@v5
        with:
          context: packages/api
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Scan API image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Push API image
        id: push-api
        uses: docker/build-push-action@v5
        with:
          context: packages/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Sign API image (keyless OIDC)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push-api.outputs.digest }}"

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: packages/app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # 2. DB MIGRATE — Expand-phase migrations (backward-compatible)
  #    Runs BEFORE traffic switch so both old and new code stay compatible.
  # ────────────────────────────────────────────────────────────────────────────
  db-migrate:
    name: Database Migrations (expand phase)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_migration != 'true' }}
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Run expand-phase migrations
        run: |
          chmod +x deploy/scripts/db-migrate-blue-green.sh
          deploy/scripts/db-migrate-blue-green.sh \
            --phase expand \
            --namespace ${{ env.NAMESPACE }} \
            --image ${{ needs.build.outputs.image-tag }} \
            --registry ${{ env.REGISTRY }}
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}

  # ────────────────────────────────────────────────────────────────────────────
  # 3. DEPLOY — Blue-green traffic switch (or canary rollout)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Blue-Green)
    runs-on: ubuntu-latest
    needs: [build, db-migrate]
    # Run even if db-migrate was skipped (skip_migration=true)
    if: always() && needs.build.result == 'success' && (needs.db-migrate.result == 'success' || needs.db-migrate.result == 'skipped')
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://api.bluecollar.io/health

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Apply K8s manifests (idempotent)
        run: |
          kubectl apply -f deploy/k8s/blue-green/namespace.yaml
          kubectl apply -f deploy/k8s/blue-green/configmap.yaml
          kubectl apply -f deploy/k8s/blue-green/services.yaml
          kubectl apply -f deploy/k8s/blue-green/deployment-blue.yaml
          kubectl apply -f deploy/k8s/blue-green/deployment-green.yaml
          kubectl apply -f deploy/k8s/blue-green/hpa.yaml
          kubectl apply -f deploy/k8s/blue-green/ingress.yaml

      - name: Run blue-green deploy
        id: bg-deploy
        run: |
          chmod +x deploy/scripts/deploy-blue-green.sh
          chmod +x deploy/scripts/switch-traffic.sh
          chmod +x deploy/scripts/smoke-tests.sh
          chmod +x deploy/scripts/monitor-deployment.sh
          chmod +x deploy/scripts/rollback.sh

          ARGS="--image ${{ needs.build.outputs.image-tag }}"
          ARGS="$ARGS --registry ${{ env.REGISTRY }}"
          ARGS="$ARGS --namespace ${{ env.NAMESPACE }}"
          ARGS="$ARGS --timeout ${{ env.ROLLOUT_TIMEOUT }}"

          if [[ "${{ github.event.inputs.canary }}" == "true" ]]; then
            ARGS="$ARGS --canary"
            ARGS="$ARGS --canary-weight ${{ github.event.inputs.canary_weight || '5' }}"
          fi

          if [[ "${{ github.event.inputs.skip_migration }}" == "true" ]]; then
            ARGS="$ARGS --skip-migration"
          fi

          deploy/scripts/deploy-blue-green.sh $ARGS
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          DOCKER_REGISTRY: ${{ env.REGISTRY }}

      - name: Record deployed slot
        if: success()
        run: |
          SLOT=$(kubectl get configmap active-env -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.data.slot}' 2>/dev/null || echo "unknown")
          echo "ACTIVE_SLOT=${SLOT}" >> "$GITHUB_ENV"
          echo "Deployed to slot: ${SLOT}"

  # ────────────────────────────────────────────────────────────────────────────
  # 4. SMOKE TESTS — Validate the live service post-deploy
  # ────────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Run smoke tests against live service
        run: |
          chmod +x deploy/scripts/smoke-tests.sh
          # Test via public URL (TLS terminated at Ingress)
          deploy/scripts/smoke-tests.sh \
            --api-url https://api.bluecollar.io \
            --app-url https://app.bluecollar.io \
            --timeout 15
        env:
          NAMESPACE: ${{ env.NAMESPACE }}

  # ────────────────────────────────────────────────────────────────────────────
  # 5. MONITOR — Watch the live service for 2 minutes post-deploy
  # ────────────────────────────────────────────────────────────────────────────
  monitor:
    name: Post-Deploy Monitor
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: needs.smoke-tests.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Monitor live service (2 min)
        run: |
          chmod +x deploy/scripts/monitor-deployment.sh
          # In CI we poll the external URL directly (no in-cluster kubectl)
          deploy/scripts/monitor-deployment.sh \
            --url https://api.bluecollar.io/health \
            --duration ${{ env.MONITOR_DURATION }} \
            --interval 10 \
            --threshold 5 \
            --no-rollback
          # Note: --no-rollback here because we can't kubectl from this runner.
          # Actual rollback on failure is handled by the 'rollback' job below.

      - name: Output monitoring result
        if: always()
        run: echo "Monitoring stage result: ${{ job.status }}"

  # ────────────────────────────────────────────────────────────────────────────
  # 6. ROLLBACK — Triggered automatically when deploy, smoke-tests, or monitor fail
  # ────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests, monitor]
    # Run only when something in the pipeline failed (not if cancelled)
    if: |
      always() &&
      (needs.deploy.result == 'failure' ||
       needs.smoke-tests.result == 'failure' ||
       needs.monitor.result == 'failure')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Execute rollback (target: <60s)
        run: |
          chmod +x deploy/scripts/rollback.sh
          deploy/scripts/rollback.sh \
            --namespace ${{ env.NAMESPACE }} \
            --timeout 60
        env:
          NAMESPACE: ${{ env.NAMESPACE }}

      - name: Verify rollback health
        run: |
          sleep 10
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            --max-time 10 \
            https://api.bluecollar.io/health || echo "000")
          echo "Post-rollback health: HTTP ${code}"
          if [[ "$code" != "200" ]]; then
            echo "::error::Post-rollback health check failed (HTTP ${code})"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # 7. NOTIFY — Slack notifications
  # ────────────────────────────────────────────────────────────────────────────
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build, deploy, smoke-tests, monitor]
    if: |
      needs.deploy.result == 'success' &&
      needs.smoke-tests.result == 'success' &&
      needs.monitor.result == 'success'

    steps:
      - name: Slack — Deployment Success
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ BlueCollar deployed successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful* ✅\n*Environment:* ${{ github.event.inputs.environment || 'production' }}\n*Image:* `${{ needs.build.outputs.image-tag }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*Author:* ${{ github.actor }}\n*Strategy:* ${{ github.event.inputs.canary == 'true' && 'Canary' || 'Blue-Green' }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  notify-failure:
    name: Notify Failure / Rollback
    runs-on: ubuntu-latest
    needs: [build, deploy, smoke-tests, monitor, rollback]
    if: |
      always() &&
      (needs.deploy.result == 'failure' ||
       needs.smoke-tests.result == 'failure' ||
       needs.monitor.result == 'failure' ||
       needs.rollback.result == 'failure')

    steps:
      - name: Slack — Deployment Failure
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 BlueCollar deployment failed — rollback triggered",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed* 🚨\n*Rollback:* ${{ needs.rollback.result == 'success' && '✅ Completed' || '❌ Also failed — manual action required' }}\n*Environment:* ${{ github.event.inputs.environment || 'production' }}\n*Image:* `${{ needs.build.outputs.image-tag }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n*Author:* @${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "style": "danger",
                      "text": { "type": "plain_text", "text": "View Failed Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
