name: DR Drill — Backup Restore Verification

on:
  schedule:
    # Monthly on the 1st at 02:00 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  verify-backup:
    name: Verify latest backup can be restored
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get latest automated snapshot
        id: snapshot
        run: |
          SNAPSHOT=$(aws rds describe-db-snapshots \
            --db-instance-identifier bluecollar-production \
            --snapshot-type automated \
            --query 'reverse(sort_by(DBSnapshots, &SnapshotCreateTime))[0].DBSnapshotIdentifier' \
            --output text)
          echo "snapshot=$SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Restore snapshot to test instance
        run: |
          aws rds restore-db-instance-from-db-snapshot \
            --db-instance-identifier bluecollar-dr-drill-${{ github.run_id }} \
            --db-snapshot-identifier ${{ steps.snapshot.outputs.snapshot }} \
            --db-instance-class db.t3.micro \
            --no-publicly-accessible

          aws rds wait db-instance-available \
            --db-instance-identifier bluecollar-dr-drill-${{ github.run_id }}

      - name: Verify restore
        run: bash deploy/scripts/verify-backup.sh bluecollar-dr-drill-${{ github.run_id }}

      - name: Cleanup test instance
        if: always()
        run: |
          aws rds delete-db-instance \
            --db-instance-identifier bluecollar-dr-drill-${{ github.run_id }} \
            --skip-final-snapshot || true
