name: Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 02:00 UTC

env:
  PNPM_VERSION: 9

jobs:
  # ── Unit security tests (SQL injection, XSS, headers, auth) ─────────────────
  security-unit:
    name: Security Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Run security tests
        run: pnpm vitest run src/__tests__/security/security.test.ts
        env:
          JWT_SECRET: test-secret

  # ── Dependency vulnerability scan ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Audit API dependencies
        run: pnpm audit --audit-level=high
        working-directory: packages/api
        continue-on-error: true
      - name: Audit App dependencies
        run: pnpm audit --audit-level=high
        working-directory: packages/app
        continue-on-error: true
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── OWASP ZAP DAST scan ──────────────────────────────────────────────────────
  owasp-zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bluecollar
          POSTGRES_PASSWORD: bluecollar
          POSTGRES_DB: bluecollar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Migrate and seed
        run: pnpm prisma migrate deploy && pnpm seed
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test
      - name: Start API
        run: pnpm build && node dist/index.js &
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test
          JWT_SECRET: zap-secret
          PORT: 3000
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do curl -sf http://localhost:3000/api/workers && break; sleep 2; done
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000/api'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 30

  # ── Secret scanning ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
