###############################################################################
# active-env ConfigMap
# Single source of truth: which slot (blue | green) is currently live.
# The deploy script patches .data.slot on every successful promotion.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: active-env
  namespace: bluecollar
  labels:
    app.kubernetes.io/part-of: bluecollar
    app.kubernetes.io/managed-by: deploy-blue-green
data:
  # Possible values: "blue" | "green"
  slot: "blue"
  # ISO-8601 timestamp of the last successful promotion (set by deploy script)
  promoted-at: ""
  # Git SHA of the image that is currently live
  live-sha: ""
