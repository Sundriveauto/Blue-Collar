###############################################################################
# Blue slot Deployment
# Image tag is patched by deploy-blue-green.sh at deploy time:
#   kubectl set image deployment/bluecollar-api-blue api=<registry>/bluecollar-api:<sha>
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluecollar-api-blue
  namespace: bluecollar
  labels:
    app: bluecollar-api
    app.kubernetes.io/name: bluecollar-api
    app.kubernetes.io/part-of: bluecollar
    slot: blue
  annotations:
    # Populated by deploy script
    bluecollar.io/deploy-sha: ""
    bluecollar.io/deployed-at: ""
spec:
  replicas: 3
  # Recreate is safe for the IDLE slot — no live traffic hits it during the swap.
  # Once it becomes live the HPA takes over.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bluecollar-api
      slot: blue
  template:
    metadata:
      labels:
        app: bluecollar-api
        app.kubernetes.io/name: bluecollar-api
        slot: blue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: bluecollar-api
              slot: blue
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          # Image is patched by deploy script; this default will never run in prod
          image: ghcr.io/blue-kollar/blue-collar:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: redis-url
                  optional: true
            - name: SLOT
              value: "blue"
          # Liveness: is the process alive?
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          # Readiness: is the pod ready to serve traffic (DB + Redis connected)?
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1
          # Startup: give the app time to run migrations on first boot
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24   # 2 minutes total (24 × 5s)
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          lifecycle:
            # Graceful shutdown: stop accepting new connections before SIGTERM
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      # Pull from private registry if needed
      # imagePullSecrets:
      #   - name: registry-credentials
