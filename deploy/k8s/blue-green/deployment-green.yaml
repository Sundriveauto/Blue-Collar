###############################################################################
# Green slot Deployment
# Mirror of deployment-blue.yaml — only slot label/value differs.
# Image tag is patched by deploy-blue-green.sh:
#   kubectl set image deployment/bluecollar-api-green api=<registry>/bluecollar-api:<sha>
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluecollar-api-green
  namespace: bluecollar
  labels:
    app: bluecollar-api
    app.kubernetes.io/name: bluecollar-api
    app.kubernetes.io/part-of: bluecollar
    slot: green
  annotations:
    bluecollar.io/deploy-sha: ""
    bluecollar.io/deployed-at: ""
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bluecollar-api
      slot: green
  template:
    metadata:
      labels:
        app: bluecollar-api
        app.kubernetes.io/name: bluecollar-api
        slot: green
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: bluecollar-api
              slot: green
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: ghcr.io/blue-kollar/blue-collar:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bluecollar-secrets
                  key: redis-url
                  optional: true
            - name: SLOT
              value: "green"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
