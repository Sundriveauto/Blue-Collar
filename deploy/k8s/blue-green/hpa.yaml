###############################################################################
# HPAs for both blue and green slots
# Both slots are scaled independently so the idle slot can be pre-warmed.
###############################################################################

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bluecollar-api-blue-hpa
  namespace: bluecollar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bluecollar-api-blue
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bluecollar-api-green-hpa
  namespace: bluecollar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bluecollar-api-green
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget — ensures at least 2 pods remain available during node maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bluecollar-api-blue-pdb
  namespace: bluecollar
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: bluecollar-api
      slot: blue

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bluecollar-api-green-pdb
  namespace: bluecollar
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: bluecollar-api
      slot: green
