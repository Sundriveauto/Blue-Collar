###############################################################################
# Ingress for blue-green + canary traffic splitting
#
# Normal operation:  all traffic → bluecollar-api (live service)
# Canary mode:       nginx.ingress.kubernetes.io/canary-weight annotation
#                    is patched by the canary script to split traffic between
#                    bluecollar-api (stable) and bluecollar-api-canary.
###############################################################################

# ── Primary ingress (stable / active slot) ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bluecollar-ingress
  namespace: bluecollar
  labels:
    app.kubernetes.io/part-of: bluecollar
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Tune proxy timeouts to support long-running SSE/WS connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Enable real-IP forwarding
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.bluecollar.io
        - app.bluecollar.io
      secretName: bluecollar-tls
  rules:
    - host: api.bluecollar.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluecollar-api
                port:
                  number: 80
    - host: app.bluecollar.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluecollar-app
                port:
                  number: 3001

---
# ── Canary ingress (weight is patched to 0 outside canary deployments) ────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bluecollar-ingress-canary
  namespace: bluecollar
  labels:
    app.kubernetes.io/part-of: bluecollar
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Mark this as the canary ingress
    nginx.ingress.kubernetes.io/canary: "true"
    # Weight is set to 0 by default; patched to 5/20/50 during canary rollouts
    nginx.ingress.kubernetes.io/canary-weight: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.bluecollar.io
      secretName: bluecollar-tls
  rules:
    - host: api.bluecollar.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluecollar-api-canary
                port:
                  number: 80
