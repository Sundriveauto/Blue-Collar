input {
  tcp {
    port => 5000
    codec => json
  }
  
  # Accept logs via HTTP (e.g., from log forwarders)
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse JSON logs
  json {
    source => "message"
    skip_on_invalid_json => true
  }
  
  # Add timestamp if not present
  if ![timestamp] {
    ruby {
      code => 'event.set("timestamp", Time.now)'
    }
  }
  
  # Extract request metadata
  grok {
    match => {
      "message" => "%{IP:client_ip}.*\[%{TIMESTAMP_ISO8601:@timestamp}\] \"%{WORD:http_method} %{DATA:http_uri}.*\" %{NUMBER:http_status:int}"
    }
    add_tag => ["http_access"]
    tag_on_failure => []
  }
  
  # Identify error logs
  if [level] == "ERROR" or [status] =~ /^5/ {
    mutate {
      add_tag => ["error"]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "bluecollar-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # Also output to stdout for debugging
  if [@metadata][index] == "debug" {
    stdout {
      codec => json
    }
  }
}
