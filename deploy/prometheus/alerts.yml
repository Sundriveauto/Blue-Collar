groups:
  - name: bluecollar_alerts
    interval: 30s
    rules:
      # Infrastructure Alerts
      - alert: APIDown
        expr: up{job="api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'API is down'
          description: 'API has been unreachable for 2 minutes'

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate detected'
          description: 'Error rate is above 5% for the last 5 minutes'

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High API latency'
          description: 'P95 response time exceeds 1 second'

      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Database is down'
          description: 'PostgreSQL has been unreachable for 1 minute'

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count > 95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Database connection pool near capacity'
          description: 'Active connections: {{ $value }}'

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: 'Redis is down'
          description: 'Redis cache has been unreachable for 1 minute'

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage'
          description: 'Memory usage is above 90%: {{ printf "%.0f" $value }}%'

      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage'
          description: 'CPU usage is above 80%: {{ printf "%.0f" $value }}%'

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Low disk space'
          description: 'Disk space is below 10%'

      - alert: TLSCertificateExpiringSoon
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 3600
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: 'TLS certificate expiring within 14 days'
          description: 'Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} expires in less than 14 days'

      - alert: TLSCertificateExpiryCritical
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 3 * 24 * 3600
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: 'TLS certificate expiring within 3 days'
          description: 'Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} expires in less than 3 days'

      - alert: TLSCertificateNotReady
        expr: certmanager_certificate_ready_status{condition="True"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'TLS certificate not ready'
          description: 'Certificate {{ $labels.name }} in namespace {{ $labels.namespace }} is not in Ready state'

  # SLA Monitoring
  - name: bluecollar_sla
    interval: 1m
    rules:
      - record: api:uptime:month
        expr: avg_over_time(up{job="api"}[30d]) * 100

      - record: api:response_time:p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      - record: api:error_rate:5m
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])

      - alert: SLAViolation
        expr: api:uptime:month < 99.5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'SLA violation - uptime below 99.5%'
          description: 'Monthly uptime: {{ printf "%.2f" $value }}%'

  # Business Metrics Alerts
  - name: bluecollar_business
    interval: 5m
    rules:
      - alert: NoNewWorkerRegistrations
        expr: increase(bluecollar_worker_registrations_total[1h]) == 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: 'No new worker registrations in the last hour'
          description: 'Business growth may be impacted'

      - alert: LowPaymentThroughput
        expr: rate(bluecollar_tips_total[1h]) < 1
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: 'Low payment throughput'
          description: 'Less than 1 payment per hour on average'
