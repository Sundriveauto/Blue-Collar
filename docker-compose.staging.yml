version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bluecollar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-bluecollar_staging}
    volumes:
      - db_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-bluecollar} -d ${POSTGRES_DB:-bluecollar_staging}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - packages/api/.env.staging
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-bluecollar}:${POSTGRES_PASSWORD:-staging-change-me}@db:5432/${POSTGRES_DB:-bluecollar_staging}
    expose:
      - '3000'
    ports:
      - '3000:3000'
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/index.js']
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - staging

  app:
    image: node:20-alpine
    working_dir: /workspace/packages/app
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - packages/app/.env.staging
    environment:
      NODE_ENV: staging
      PORT: 3001
    volumes:
      - ./:/workspace
    command:
      ['sh', '-c', 'corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm start -p 3001']
    expose:
      - '3001'
    ports:
      - '3001:3001'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - staging

volumes:
  db_staging_data:

networks:
  staging:
    driver: bridge
